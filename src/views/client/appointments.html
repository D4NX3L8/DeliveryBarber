<!doctype html>
<html lang="en">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.min.css"
      rel="stylesheet"
    />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/public/css/global.css" />
    <link rel="stylesheet" href="/public/css/navbar.css" />
    <link rel="stylesheet" href="/public/css/footer.css" />
    <link rel="stylesheet" href="/public/css/public/contact.css" />
    <title>Document</title>
    <!-- Esto es para las alertas -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" />
</head>
  <body>
    <header id="navbar"></header>

    <main>
      <h1>Agendar Cita</h1>

      <form id="appointmentForm">
        <input type="text" id="service" placeholder="Servicio" required />

        <label for="barber"> Barbero </label>

        <select id="barber" required></select>

        <label for="date"> Fecha </label>

        <input type="date" id="date" required />

        <label for="time"> Hora </label>

        <select id="time" required>
          <option value="">Selecciona barbero y fecha</option>
        </select>

        <input type="text" id="address" placeholder="Dirección" required />

        <button type="submit">Agendar</button>
      </form>

      <section id="appointmentHistory">
        <h2>Historial de Citas</h2>

        <label for="appointmentFilter">Filtrar por estado</label>

        <select id="appointmentFilter">
          <option value="all">Todas</option>
          <option value="pending">Pendientes</option>
          <option value="accepted">Aceptadas</option>
          <option value="rejected">Rechazadas</option>
          <option value="completed">Completadas</option>
          <option value="cancelled">Canceladas</option>
        </select>

        <div id="appointmentHistoryContainer"></div>
      </section>
    </main>

    <script
      type="module"
      src="../../../public/js/components/navbar.js"
    ></script>

    <script
      type="module"
      src="../../../public/js/client/appointments.js"
    ></script>
    <!-- Esto es para las alertas -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
